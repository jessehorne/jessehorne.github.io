<script>
var speed = 80;
var currspeed = "+=" + speed;
var doStuff = function() {
  if ($("#tweeter").position().left >= 900) {
    currspeed = "-=" + speed;
  } else if ($("#tweeter").position().left <= 200) {
    currspeed = "+=" + speed;
  }
  $("#tweeter").animate({
    left: currspeed
  });
};

setInterval(doStuff, 1000);
</script>
