<!DOCTYPE html>
<html>
<head>
	<title>Pipe Dreams by Jesse Horne</title>
	<link rel="stylesheet" href="./css/pipedreams.css"/>
</head>
<body id="body" onload="localStorage.clear(); pd_init();">
<h1>Pipe Dreams</h1>

<!-- Game Data, such as Money -->
<div id="pd_data">
<b>Money</b> - <i id="pd_money"></i><br />
</div>

<br />

<!-- Store -->
<div id="pd_store_div">
<b>Seeds</b>
<table id="pd_store">
<tr>
	<td>Strain</td>
	<td>Cost</td>
	<td>Time</td>
	<td>Sell</td>
	<td></td>
</tr>
</table>
</div>

<br />

<!-- User Items -->
<div id="pd_items_div">
<b>Items</b>
<table id="pd_items">
<tr>
	<td>Item</td>
	<td>Sell</td>
	<td>Time</td>
	<td></td>
</tr>
</table>
</div>

<br />

<!-- Grow Spot -->
<div id="pd_growspot_div">
<table id="pd_growspot">

</table>
</div>

<script src="./js/pipedreams.js"></script>
</body>
</html>
