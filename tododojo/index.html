<!DOCTYPE html>
<html>
<head>
	<title>TodoDojo beta</title>
	<link rel="stylesheet" href="libs/uikit/css/uikit.min.css"/>
	<script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.1/jquery.js"></script>
	<script type="text/javascript" src="./libs/uikit/js/uikit.min.js"></script>\
	<script type="text/javascript" src="./js/tododojo.js"></script>
</head>
<body onload="loadToDo();">
	<!-- Header NavBar -->
	<nav class="uk-navbar">
		<ul class="uk-navbar-nav">
			<li class="uk-active"><a href="">TodoDojo</a></li>
			<li class="uk-text-muted">alpha</li>
		</ul>
		<div class="uk-navbar-flip">
			<ul class="uk-navbar-nav">
				<li><a href="https://www.paypal.com/cgi-bin/webscr?cmd=_donations&business=j%2ehorne2796%40gmail%2ecom&lc=US&item_name=TodoDojo&no_note=0&currency_code=USD&bn=PP%2dDonationsBF%3abtn_donateCC_LG%2egif%3aNonHostedGuest">Donate</a></li>
			</ul>
		</div>
	</nav>
	<br/>
	<!-- Items -->
	<table class="uk-table">
		<thead>
			<tr>
				<th class="uk-width-1-10">Id</th>
				<th class="uk-width-8-10">Item</th>
				<th class="uk-width-1-10">Delete</th>
			</tr>
		</thead>
		<tbody id="list">
		</tbody>
	</table>

	<table class="uk-table">
		<tbody>
			<tr>
				<td class="uk-width-9-10"><input id="textinput" class="uk-width-8-10" type="text" placeholder=""></td>
				<td class="uk-width-1-10"><button onclick="createItem();" href="">Create</button></td>
			</tr>
		</tbody>
	</table>
</body>
</html>
